<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTP Workspace | CTP 穿透测试</title>
    <script>
        (() => {
            const themeMedia = window.matchMedia('(prefers-color-scheme: dark)');
            const getSystemTheme = () => themeMedia.matches ? 'dark' : 'light';
            const applyTheme = (nextTheme) => {
                document.documentElement.setAttribute('data-bs-theme', nextTheme);
            };

            window.__ctpTheme = {
                media: themeMedia,
                getSystemTheme,
                applyTheme,
            };

            const nextTheme = getSystemTheme();
            applyTheme(nextTheme);
            document.documentElement.setAttribute('data-bs-theme', nextTheme);
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
</head>
<body class="dashboard-page">
    <div class="app-shell">
        <div id="workspace-grid" class="workspace-grid" data-rail-state="expanded" data-mobile-open="false">
            <aside id="ops-rail" class="ops-rail" aria-label="控制台侧边栏">
                <div class="rail-head">
                    <div class="brand-block">
                        <h1>CTP 穿透测试</h1>
                    </div>
                    <button id="rail-toggle" class="rail-toggle" type="button" aria-expanded="true" aria-controls="ops-rail" aria-label="收起侧边栏">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M15 6 9 12l6 6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                        </svg>
                    </button>
                </div>

                <div class="rail-scroll">
                    <section class="rail-group">
                        <h2 class="panel-title">{{ env.CTP_NAME }}</h2>
                        <div class="info-list">
                            <div class="info-row">
                                <span class="info-label">账户</span>
                                <span class="info-value">{{ env.CTP_USERNAME }}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">交易服务器</span>
                                <span class="info-value" title="{{ env.CTP_TD_SERVER }}">{{ env.CTP_TD_SERVER }}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">行情服务器</span>
                                <span class="info-value" title="{{ env.CTP_MD_SERVER }}">{{ env.CTP_MD_SERVER }}</span>
                            </div>
                        </div>
                    </section>

                    <section class="rail-group">
                        <h2 class="panel-title">风险计数</h2>
                        <div class="metric-list">
                            <div class="metric-row">
                                <span class="metric-label">报单笔数</span>
                                <span class="metric-value" id="metric-order">-</span>
                            </div>
                            <div class="metric-row">
                                <span class="metric-label">撤单笔数</span>
                                <span class="metric-value" id="metric-cancel">-</span>
                            </div>
                            <div class="metric-row">
                                <span class="metric-label">重复报单(选测)</span>
                                <span class="metric-value" id="metric-repeat">-</span>
                            </div>
                        </div>
                    </section>

                    <section class="rail-group rail-tests">
                        <div class="accordion rail-accordion" id="testAccordion">
                            <div class="accordion-item">
                                <h2 class="accordion-header">
                                    <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#c21" aria-expanded="true" aria-controls="c21">
                                        2.1 接口适应性
                                    </button>
                                </h2>
                                <div id="c21" class="accordion-collapse collapse show" data-bs-parent="#testAccordion">
                                    <div class="accordion-body">
                                        <div class="action-stack">
                                            <button onclick="runTest('2.1.1')" class="btn btn-outline-light btn-sm w-100">连通性测试</button>
                                            <button onclick="openTestConfigModal()" class="btn btn-outline-secondary btn-sm w-100">设置测试参数</button>
                                            <button onclick="runTest('2.1.2.1')" class="btn btn-outline-light btn-sm w-100">开仓测试</button>
                                            <button onclick="runTest('2.1.2.2')" class="btn btn-outline-light btn-sm w-100">平仓测试</button>
                                            <button onclick="runTest('2.1.2.3')" class="btn btn-outline-light btn-sm w-100">撤单测试</button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="accordion-item">
                                <h2 class="accordion-header">
                                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#c22" aria-expanded="false" aria-controls="c22">
                                        2.2 异常监测
                                    </button>
                                </h2>
                                <div id="c22" class="accordion-collapse collapse" data-bs-parent="#testAccordion">
                                    <div class="accordion-body">
                                        <div class="action-stack">
                                            <button onclick="runTest('2.2.1.1')" class="btn btn-outline-light btn-sm w-100">连接状态监测</button>
                                            <button onclick="runTest('2.2.1.2')" class="btn btn-outline-light btn-sm w-100">断线模拟</button>
                                            <button onclick="runTest('2.2.1.3')" class="btn btn-outline-light btn-sm w-100">重连模拟</button>
                                        </div>
                                        <hr class="action-divider">
                                        <div class="action-stack">
                                            <button onclick="openRepeatMonitorConfigModal()" class="btn btn-outline-secondary btn-sm w-100">设置重复报单监测阈值</button>
                                            <button onclick="runTest('2.2.3.1')" class="btn btn-outline-light btn-sm w-100">重复报单监测(开)</button>
                                            <button onclick="runTest('2.2.3.2')" class="btn btn-outline-light btn-sm w-100">重复报单监测(平)</button>
                                            <button onclick="runTest('2.2.3.3')" class="btn btn-outline-light btn-sm w-100">重复报单监测(撤)</button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="accordion-item">
                                <h2 class="accordion-header">
                                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#c23" aria-expanded="false" aria-controls="c23">
                                        2.3 阈值管理
                                    </button>
                                </h2>
                                <div id="c23" class="accordion-collapse collapse" data-bs-parent="#testAccordion">
                                    <div class="accordion-body">
                                        <div class="action-stack">
                                            <button onclick="openThresholdModal()" class="btn btn-outline-secondary btn-sm w-100">设置阈值</button>
                                            <button onclick="runTest('2.3.1.1')" class="btn btn-outline-light btn-sm w-100">报单统计与阈值预警</button>
                                            <button onclick="runTest('2.3.1.3')" class="btn btn-outline-light btn-sm w-100">撤单统计与阈值预警</button>
                                            <button onclick="runTest('2.3.1.5')" class="btn btn-outline-light btn-sm w-100">重复报单预警</button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="accordion-item">
                                <h2 class="accordion-header">
                                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#c24" aria-expanded="false" aria-controls="c24">
                                        2.4 错误防范
                                    </button>
                                </h2>
                                <div id="c24" class="accordion-collapse collapse" data-bs-parent="#testAccordion">
                                    <div class="accordion-body">
                                        <div class="action-stack">
                                            <button onclick="runTest('2.4.1.1')" class="btn btn-outline-light btn-sm w-100">合约代码错误</button>
                                            <button onclick="runTest('2.4.1.2')" class="btn btn-outline-light btn-sm w-100">价格错误</button>
                                            <button onclick="openVolumeLimitModal()" class="btn btn-outline-secondary btn-sm w-100">数量超限</button>
                                        </div>
                                        <hr class="action-divider">
                                        <div class="action-stack">
                                            <button onclick="runTest('2.4.2.1')" class="btn btn-outline-light btn-sm w-100">资金不足提示</button>
                                            <button onclick="runTest('2.4.2.2')" class="btn btn-outline-light btn-sm w-100">持仓不足提示</button>
                                            <button onclick="runTest('2.4.2.3')" class="btn btn-outline-light btn-sm w-100">市场状态错误</button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="accordion-item">
                                <h2 class="accordion-header">
                                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#c25" aria-expanded="false" aria-controls="c25">
                                        2.5 应急处理
                                    </button>
                                </h2>
                                <div id="c25" class="accordion-collapse collapse" data-bs-parent="#testAccordion">
                                    <div class="accordion-body">
                                        <div class="action-caption">常规动作</div>
                                        <div class="action-stack">
                                            <button onclick="runTest('2.5.1.1')" class="btn btn-outline-light btn-sm w-100">限制交易权限</button>
                                            <button onclick="runTest('2.5.1.2')" class="btn btn-outline-light btn-sm w-100">暂停策略执行</button>
                                        </div>
                                        <hr class="action-divider">
                                        <div class="action-caption action-caption-danger">危险动作</div>
                                        <div class="action-stack">
                                            <button onclick="runTest('2.5.1.3')" class="btn btn-danger btn-sm w-100">强制账号退出</button>
                                            <button onclick="runTest('2.5.2.1')" class="btn btn-outline-light btn-sm w-100">撤销部分成交</button>
                                            <button onclick="runTest('2.5.2.2')" class="btn btn-outline-light btn-sm w-100">批量撤销所有</button>
                                        </div>
                                        <hr class="action-divider">
                                        <div class="action-caption action-caption-success">恢复动作</div>
                                        <div class="action-stack">
                                            <button onclick="resetSystem()" class="btn btn-success btn-sm w-100">重置 / 恢复交易权限</button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="accordion-item">
                                <h2 class="accordion-header">
                                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#c26" aria-expanded="false" aria-controls="c26">
                                        2.6 日志记录
                                    </button>
                                </h2>
                                <div id="c26" class="accordion-collapse collapse" data-bs-parent="#testAccordion">
                                    <div class="accordion-body">
                                        <div class="action-stack">
                                            <button onclick="runTest('2.6.1')" class="btn btn-outline-light btn-sm w-100">日志记录功能</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            </aside>

            <main class="terminal-workspace">
                <button id="mobile-rail-toggle" class="mobile-rail-toggle" type="button" aria-expanded="false" aria-controls="ops-rail">
                    菜单
                </button>

                <section class="terminal-panel">
                    <div class="terminal-header">
                        <div>
                            <h2 class="terminal-title">执行日志</h2>
                        </div>
                    </div>
                    <div id="log-container">
                        <div class="terminal-placeholder">Waiting for connection...</div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <div class="modal fade" id="thresholdModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">阈值设置及预警</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="config-grid">
                        <div class="config-item">
                            <div class="config-item-head">
                                <label for="thr-order" class="form-label">报单阈值</label>
                                <span class="current-value">当前: <span id="current-thr-order">-</span></span>
                            </div>
                            <input id="thr-order" type="number" min="1" step="1" class="form-control" placeholder="例如 5">
                        </div>
                        <div class="config-item">
                            <div class="config-item-head">
                                <label for="thr-cancel" class="form-label">撤单阈值</label>
                                <span class="current-value">当前: <span id="current-thr-cancel">-</span></span>
                            </div>
                            <input id="thr-cancel" type="number" min="1" step="1" class="form-control" placeholder="例如 3">
                        </div>
                        <div class="config-item">
                            <div class="config-item-head">
                                <label for="thr-repeat" class="form-label">重复报单阈值(选测)</label>
                                <span class="current-value">当前: <span id="current-thr-repeat">-</span></span>
                            </div>
                            <div class="switch-row">
                                <input class="form-check-input" type="checkbox" role="switch" id="thr-repeat-enabled" checked>
                                <label class="form-check-label" for="thr-repeat-enabled">启用重复报单预警</label>
                            </div>
                            <input id="thr-repeat" type="number" min="1" step="1" class="form-control" placeholder="例如 2">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveThresholds()">保存配置</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="volumeLimitModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">数量超限参数设置</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="config-grid">
                        <div class="config-item">
                            <label for="volerr-symbol" class="form-label">发单品种 (test_symbol)</label>
                            <input id="volerr-symbol" type="text" class="form-control" placeholder="例如 IF2602">
                        </div>
                        <div class="config-item">
                            <label for="volerr-volume" class="form-label">委托手数 (volume)</label>
                            <input id="volerr-volume" type="number" min="1" step="1" class="form-control" placeholder="例如 10000">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveAndRunVolumeLimit()">保存并运行测试</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="testConfigModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">基础交易参数设置</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="config-grid">
                        <div class="config-item">
                            <label for="conf-symbol" class="form-label">测试合约代码 (test_symbol)</label>
                            <input id="conf-symbol" type="text" class="form-control" placeholder="例如 IF2602">
                        </div>
                        <div class="config-item">
                            <label for="conf-safe-price" class="form-label">安全买入价 (safe_buy_price) - 平仓用</label>
                            <input id="conf-safe-price" type="number" step="0.2" class="form-control" placeholder="例如 4700.0">
                        </div>
                        <div class="config-item">
                            <label for="conf-deal-price" class="form-label">成交买入价 (deal_buy_price) - 开仓用</label>
                            <input id="conf-deal-price" type="number" step="0.2" class="form-control" placeholder="例如 4800.0">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveAndRunTestConfig()">保存并运行测试</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="repeatMonitorConfigModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">重复报单监测参数设置</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="config-grid">
                        <div class="config-item">
                            <label for="repeat-open-thr" class="form-label">开仓监测阈值 (repeat_open_threshold)</label>
                            <input id="repeat-open-thr" type="number" min="1" step="1" class="form-control" placeholder="例如 2">
                        </div>
                        <div class="config-item">
                            <label for="repeat-close-thr" class="form-label">平仓监测阈值 (repeat_close_threshold)</label>
                            <input id="repeat-close-thr" type="number" min="1" step="1" class="form-control" placeholder="例如 2">
                        </div>
                        <div class="config-item">
                            <label for="repeat-conf-symbol" class="form-label">测试合约代码 (test_symbol)</label>
                            <input id="repeat-conf-symbol" type="text" class="form-control" placeholder="例如 IF2602">
                        </div>
                        <div class="config-item">
                            <label for="repeat-conf-safe-price" class="form-label">安全买入价 (safe_buy_price) - 平仓用</label>
                            <input id="repeat-conf-safe-price" type="number" step="0.2" class="form-control" placeholder="例如 4700.0">
                        </div>
                        <div class="config-item">
                            <label for="repeat-conf-deal-price" class="form-label">成交买入价 (deal_buy_price) - 开仓用</label>
                            <input id="repeat-conf-deal-price" type="number" step="0.2" class="form-control" placeholder="例如 4800.0">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveRepeatMonitorConfig()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="orderCancelMonitorConfigModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">报撤单监测阈值设置</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="config-grid">
                        <div class="config-item">
                            <label for="order-monitor-thr" class="form-label">报单监测阈值 (order_monitor_threshold)</label>
                            <input id="order-monitor-thr" type="number" min="1" step="1" class="form-control" placeholder="例如 5">
                        </div>
                        <div class="config-item">
                            <label for="cancel-monitor-thr" class="form-label">撤单监测阈值 (cancel_monitor_threshold)</label>
                            <input id="cancel-monitor-thr" type="number" min="1" step="1" class="form-control" placeholder="例如 3">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveOrderCancelMonitorConfig()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-host">
        <div id="toast-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const socket = io();
        const railStorageKey = 'ctp_workspace_rail_state';
        const workspaceGrid = document.getElementById('workspace-grid');
        const railToggle = document.getElementById('rail-toggle');
        const mobileRailToggle = document.getElementById('mobile-rail-toggle');
        const logContainer = document.getElementById('log-container');
        const toastContainer = document.getElementById('toast-container');

        const thresholdInputs = {
            order: document.getElementById('thr-order'),
            cancel: document.getElementById('thr-cancel'),
            repeat: document.getElementById('thr-repeat'),
            repeatEnabled: document.getElementById('thr-repeat-enabled'),
        };

        const thresholdCurrent = {
            order: document.getElementById('current-thr-order'),
            cancel: document.getElementById('current-thr-cancel'),
            repeat: document.getElementById('current-thr-repeat'),
        };

        const metrics = {
            order: document.getElementById('metric-order'),
            cancel: document.getElementById('metric-cancel'),
            repeat: document.getElementById('metric-repeat'),
        };

        const testConfigInputs = {
            symbol: document.getElementById('conf-symbol'),
            safePrice: document.getElementById('conf-safe-price'),
            dealPrice: document.getElementById('conf-deal-price'),
        };

        const repeatMonitorConfigInputs = {
            openThreshold: document.getElementById('repeat-open-thr'),
            closeThreshold: document.getElementById('repeat-close-thr'),
            symbol: document.getElementById('repeat-conf-symbol'),
            safePrice: document.getElementById('repeat-conf-safe-price'),
            dealPrice: document.getElementById('repeat-conf-deal-price'),
        };

        const orderCancelMonitorConfigInputs = {
            orderThreshold: document.getElementById('order-monitor-thr'),
            cancelThreshold: document.getElementById('cancel-monitor-thr'),
        };

        const volumeLimitInputs = {
            symbol: document.getElementById('volerr-symbol'),
            volume: document.getElementById('volerr-volume'),
        };

        let thresholdModal;
        let volumeLimitModal;
        let testConfigModal;
        let repeatMonitorConfigModal;
        let orderCancelMonitorConfigModal;

        let lastToastKey = '';
        let lastToastAt = 0;

        function applyRailState(nextState) {
            const safeState = nextState === 'collapsed' ? 'collapsed' : 'expanded';
            workspaceGrid.dataset.railState = safeState;
            railToggle.setAttribute('aria-expanded', String(safeState === 'expanded'));
            railToggle.setAttribute('aria-label', safeState === 'expanded' ? '收起侧边栏' : '展开侧边栏');
            localStorage.setItem(railStorageKey, safeState);
        }

        function setMobileRailOpen(isOpen) {
            const nextOpen = Boolean(isOpen);
            workspaceGrid.dataset.mobileOpen = nextOpen ? 'true' : 'false';
            mobileRailToggle.setAttribute('aria-expanded', String(nextOpen));
        }

        function setText(el, value, fallback = '-') {
            if (!el) return;
            el.textContent = value ?? fallback;
        }

        function setState(el, value, state, fallback = '-') {
            if (!el) return;
            el.textContent = value ?? fallback;
            if (state) {
                el.dataset.state = state;
            } else {
                delete el.dataset.state;
            }
        }

        function formatDateTime(timestampSeconds) {
            if (!timestampSeconds) return '-';
            const date = new Date(Number(timestampSeconds) * 1000);
            if (Number.isNaN(date.getTime())) return '-';
            return date.toLocaleString('zh-CN', { hour12: false });
        }

        function updateLogCount() {
            return logContainer.children.length;
        }

        function isNearLogBottom() {
            return logContainer.scrollHeight - logContainer.scrollTop - logContainer.clientHeight < 50;
        }

        function addSystemEvent(message, kind, replace = false) {
            const shouldFollow = isNearLogBottom();
            const event = document.createElement('div');
            event.className = `terminal-event${kind === 'online' ? ' is-online' : ''}${kind === 'offline' ? ' is-offline' : ''}`;
            event.textContent = message;

            if (replace) {
                logContainer.innerHTML = '';
            }

            logContainer.appendChild(event);
            if (shouldFollow || replace) {
                logContainer.scrollTop = logContainer.scrollHeight;
            }
            updateLogCount();
        }

        function syncRepeatThresholdState() {
            thresholdInputs.repeat.disabled = !thresholdInputs.repeatEnabled.checked;
        }

        function iconMarkup(variant) {
            if (variant === 'danger') {
                return `
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="15" y1="9" x2="9" y2="15"></line>
                        <line x1="9" y1="9" x2="15" y2="15"></line>
                    </svg>
                `;
            }
            if (variant === 'success') {
                return `
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                `;
            }
            return `
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
            `;
        }

        function showToast(title, message, variant) {
            const tone = variant || 'warning';
            const toastEl = document.createElement('div');
            toastEl.className = `toast terminal-toast terminal-toast-${tone}`;
            toastEl.setAttribute('role', 'alert');
            toastEl.setAttribute('aria-live', 'assertive');
            toastEl.setAttribute('aria-atomic', 'true');
            toastEl.dataset.bsAutohide = 'true';

            const body = document.createElement('div');
            body.className = 'd-flex align-items-start p-3';

            const iconWrap = document.createElement('div');
            iconWrap.className = `terminal-toast-icon terminal-toast-icon-${tone} me-3 mt-1`;
            iconWrap.innerHTML = iconMarkup(tone);

            const content = document.createElement('div');
            content.className = 'w-100';

            const titleEl = document.createElement('div');
            titleEl.className = 'terminal-toast-title';
            titleEl.textContent = title;

            const messageEl = document.createElement('div');
            messageEl.className = 'terminal-toast-message';
            messageEl.textContent = message;

            const closeButton = document.createElement('button');
            closeButton.type = 'button';
            closeButton.className = 'btn-close ms-2';
            closeButton.setAttribute('data-bs-dismiss', 'toast');
            closeButton.setAttribute('aria-label', 'Close');

            content.appendChild(titleEl);
            content.appendChild(messageEl);
            body.appendChild(iconWrap);
            body.appendChild(content);
            body.appendChild(closeButton);
            toastEl.appendChild(body);
            toastContainer.appendChild(toastEl);

            const toast = bootstrap.Toast.getOrCreateInstance(toastEl, { delay: 6000 });
            toastEl.addEventListener('hidden.bs.toast', () => toastEl.remove());
            toast.show();
        }

        function safeInt(value) {
            const n = Number.parseInt(String(value), 10);
            if (!Number.isFinite(n) || n <= 0) return null;
            return n;
        }

        function setFormFromThresholds(thr) {
            if (!thr) return;
            const orderValue = safeInt(thr.max_order_count);
            const cancelValue = safeInt(thr.max_cancel_count);
            const repeatValue = safeInt(thr.max_repeat_count);

            if (orderValue) thresholdInputs.order.value = orderValue;
            if (cancelValue) thresholdInputs.cancel.value = cancelValue;
            if (repeatValue) thresholdInputs.repeat.value = repeatValue;

            thresholdInputs.repeatEnabled.checked = Number(thr.max_repeat_count || 0) > 0;
            syncRepeatThresholdState();
        }

        function updateSnapshot(risk) {
            const thresholds = risk && risk.thresholds ? risk.thresholds : null;
            const metric = risk && risk.metrics ? risk.metrics : null;

            if (thresholds) {
                thresholdCurrent.order.textContent = thresholds.max_order_count ?? '-';
                thresholdCurrent.cancel.textContent = thresholds.max_cancel_count ?? '-';
                thresholdCurrent.repeat.textContent = thresholds.max_repeat_count ?? '-';
            }

            if (metric) {
                metrics.order.textContent = metric.order_count ?? '-';
                metrics.cancel.textContent = metric.cancel_count ?? '-';
                metrics.repeat.textContent = metric.repeat_total ?? '-';
            }
        }

        function renderWorkerStatus(data) {
            if (!data) return;

            if (data.risk) {
                updateSnapshot(data.risk);
            }
        }

        function loadThresholdsFromServer() {
            return fetch('/api/risk/thresholds', { method: 'GET' })
                .then((res) => res.json())
                .then((data) => {
                    if (data.status !== 'success') throw new Error(data.msg || '读取阈值失败');
                    const thr = data.data || {};
                    setFormFromThresholds(thr);
                    thresholdCurrent.order.textContent = thr.max_order_count ?? '-';
                    thresholdCurrent.cancel.textContent = thr.max_cancel_count ?? '-';
                    thresholdCurrent.repeat.textContent = thr.max_repeat_count ?? '-';
                    return thr;
                })
                .catch((err) => {
                    showToast('读取阈值失败', String(err), 'danger');
                });
        }

        function loadSnapshot() {
            return fetch('/api/risk/snapshot', { method: 'GET' })
                .then((res) => res.json())
                .then((data) => {
                    if (data.status !== 'success') throw new Error(data.msg || '读取统计失败');
                    updateSnapshot(data.data || {});
                })
                .catch(() => {});
        }

        function refreshWorkerStatus() {
            return fetch('/api/worker/status', { method: 'GET' })
                .then((res) => res.json())
                .then((data) => {
                    if (data.status !== 'success') throw new Error(data.msg || '读取 Worker 状态失败');
                    renderWorkerStatus(data.data || {});
                })
                .catch(() => {});
        }

        function applyThresholds() {
            const maxOrder = safeInt(thresholdInputs.order.value);
            const maxCancel = safeInt(thresholdInputs.cancel.value);
            const repeatEnabled = Boolean(thresholdInputs.repeatEnabled.checked);
            const maxRepeat = repeatEnabled ? safeInt(thresholdInputs.repeat.value) : 0;

            if (!maxOrder || !maxCancel || (repeatEnabled && !maxRepeat)) {
                showToast('参数错误', '请填写有效的阈值(正整数)', 'danger');
                return Promise.resolve(false);
            }

            const payload = {
                max_order_count: maxOrder,
                max_cancel_count: maxCancel,
                max_repeat_count: maxRepeat,
            };

            localStorage.setItem('risk_thresholds', JSON.stringify(payload));

            return fetch('/api/risk/thresholds', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            })
                .then((res) => res.json())
                .then((data) => {
                    if (data.status !== 'success') throw new Error(data.msg || '阈值设置失败');
                    updateSnapshot(data.data || {});
                    showToast('阈值已更新', `报单=${maxOrder}, 撤单=${maxCancel}, 重复报单=${maxRepeat}`, 'warning');
                    return true;
                })
                .catch((err) => {
                    showToast('阈值设置失败', String(err), 'danger');
                    return false;
                });
        }

        function openThresholdModal() {
            if (!thresholdModal) return;
            loadThresholdsFromServer().then(() => {
                thresholdModal.show();
            });
        }

        function saveThresholds() {
            applyThresholds().then((success) => {
                if (success && thresholdModal) {
                    thresholdModal.hide();
                }
            });
        }

        function loadTestConfigFromServer() {
            return fetch('/api/test/config', { method: 'GET' })
                .then((res) => res.json())
                .then((data) => {
                    if (data.status !== 'success') throw new Error(data.msg || '读取配置失败');
                    const conf = data.data || {};
                    if (conf.test_symbol) testConfigInputs.symbol.value = conf.test_symbol;
                    if (conf.safe_buy_price) testConfigInputs.safePrice.value = conf.safe_buy_price;
                    if (conf.deal_buy_price) testConfigInputs.dealPrice.value = conf.deal_buy_price;
                    return conf;
                })
                .catch((err) => {
                    showToast('读取配置失败', String(err), 'danger');
                });
        }

        function openTestConfigModal() {
            if (!testConfigModal) return;
            loadTestConfigFromServer().then(() => {
                testConfigModal.show();
            });
        }

        function saveTestConfig() {
            const symbol = testConfigInputs.symbol.value.trim();
            const safePrice = parseFloat(testConfigInputs.safePrice.value);
            const dealPrice = parseFloat(testConfigInputs.dealPrice.value);

            if (!symbol || Number.isNaN(safePrice) || Number.isNaN(dealPrice)) {
                showToast('参数错误', '请填写有效的参数', 'danger');
                return;
            }

            const payload = {
                test_symbol: symbol,
                safe_buy_price: safePrice,
                deal_buy_price: dealPrice,
            };

            fetch('/api/test/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            })
                .then((res) => res.json())
                .then((data) => {
                    if (data.status !== 'success') throw new Error(data.msg || '配置保存失败');
                    showToast('配置已更新', `合约=${symbol}, 价格=${safePrice}/${dealPrice}`, 'warning');
                    if (testConfigModal) testConfigModal.hide();
                })
                .catch((err) => {
                    showToast('配置保存失败', String(err), 'danger');
                });
        }

        function saveAndRunTestConfig() {
            saveTestConfig();
        }

        function loadRepeatMonitorConfigFromServer() {
            return fetch('/api/test/config', { method: 'GET' })
                .then((res) => res.json())
                .then((data) => {
                    if (data.status !== 'success') throw new Error(data.msg || '读取配置失败');
                    const conf = data.data || {};
                    if (conf.repeat_open_threshold) repeatMonitorConfigInputs.openThreshold.value = conf.repeat_open_threshold;
                    if (conf.repeat_close_threshold) repeatMonitorConfigInputs.closeThreshold.value = conf.repeat_close_threshold;
                    if (conf.test_symbol) repeatMonitorConfigInputs.symbol.value = conf.test_symbol;
                    if (conf.safe_buy_price) repeatMonitorConfigInputs.safePrice.value = conf.safe_buy_price;
                    if (conf.deal_buy_price) repeatMonitorConfigInputs.dealPrice.value = conf.deal_buy_price;
                    return conf;
                })
                .catch((err) => {
                    showToast('读取配置失败', String(err), 'danger');
                });
        }

        function openRepeatMonitorConfigModal() {
            if (!repeatMonitorConfigModal) return;
            loadRepeatMonitorConfigFromServer().then(() => {
                repeatMonitorConfigModal.show();
            });
        }

        function saveRepeatMonitorConfig() {
            const openThr = safeInt(repeatMonitorConfigInputs.openThreshold.value);
            const closeThr = safeInt(repeatMonitorConfigInputs.closeThreshold.value);
            const symbol = repeatMonitorConfigInputs.symbol.value.trim();
            const safePrice = parseFloat(repeatMonitorConfigInputs.safePrice.value);
            const dealPrice = parseFloat(repeatMonitorConfigInputs.dealPrice.value);

            if (!openThr || !closeThr || !symbol || Number.isNaN(safePrice) || Number.isNaN(dealPrice)) {
                showToast('参数错误', '请填写有效的参数', 'danger');
                return;
            }

            const payload = {
                repeat_open_threshold: openThr,
                repeat_close_threshold: closeThr,
                test_symbol: symbol,
                safe_buy_price: safePrice,
                deal_buy_price: dealPrice,
            };

            fetch('/api/test/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            })
                .then((res) => res.json())
                .then((data) => {
                    if (data.status !== 'success') throw new Error(data.msg || '配置保存失败');
                    showToast('配置已更新', `阈值=${openThr}/${closeThr}, 合约=${symbol}, 价格=${safePrice}/${dealPrice}`, 'warning');
                    if (repeatMonitorConfigModal) repeatMonitorConfigModal.hide();
                })
                .catch((err) => {
                    showToast('配置保存失败', String(err), 'danger');
                });
        }

        function loadOrderCancelMonitorConfigFromServer() {
            return fetch('/api/test/config', { method: 'GET' })
                .then((res) => res.json())
                .then((data) => {
                    if (data.status !== 'success') throw new Error(data.msg || '读取配置失败');
                    const conf = data.data || {};
                    if (conf.order_monitor_threshold) orderCancelMonitorConfigInputs.orderThreshold.value = conf.order_monitor_threshold;
                    if (conf.cancel_monitor_threshold) orderCancelMonitorConfigInputs.cancelThreshold.value = conf.cancel_monitor_threshold;
                    return conf;
                })
                .catch((err) => {
                    showToast('读取配置失败', String(err), 'danger');
                });
        }

        function openOrderCancelMonitorConfigModal() {
            if (!orderCancelMonitorConfigModal) return;
            loadOrderCancelMonitorConfigFromServer().then(() => {
                if (!orderCancelMonitorConfigInputs.orderThreshold.value) orderCancelMonitorConfigInputs.orderThreshold.value = 1;
                if (!orderCancelMonitorConfigInputs.cancelThreshold.value) orderCancelMonitorConfigInputs.cancelThreshold.value = 1;
                orderCancelMonitorConfigModal.show();
            });
        }

        function saveOrderCancelMonitorConfig() {
            const orderThr = safeInt(orderCancelMonitorConfigInputs.orderThreshold.value);
            const cancelThr = safeInt(orderCancelMonitorConfigInputs.cancelThreshold.value);

            if (!orderThr || !cancelThr) {
                showToast('参数错误', '请填写有效的阈值(正整数)', 'danger');
                return;
            }

            const payload = {
                order_monitor_threshold: orderThr,
                cancel_monitor_threshold: cancelThr,
            };

            fetch('/api/test/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            })
                .then((res) => res.json())
                .then((data) => {
                    if (data.status !== 'success') throw new Error(data.msg || '配置保存失败');
                    showToast('配置已更新', `报单监测阈值=${orderThr}, 撤单监测阈值=${cancelThr}`, 'warning');
                    if (orderCancelMonitorConfigModal) orderCancelMonitorConfigModal.hide();
                })
                .catch((err) => {
                    showToast('配置保存失败', String(err), 'danger');
                });
        }

        function loadVolumeLimitConfigFromServer() {
            return fetch('/api/test/config', { method: 'GET' })
                .then((res) => res.json())
                .then((data) => {
                    if (data.status !== 'success') throw new Error(data.msg || '读取配置失败');
                    const conf = data.data || {};
                    if (conf.test_symbol) volumeLimitInputs.symbol.value = conf.test_symbol;
                    if (conf.volume_limit_volume) volumeLimitInputs.volume.value = conf.volume_limit_volume;
                    return conf;
                })
                .catch((err) => {
                    showToast('读取配置失败', String(err), 'danger');
                });
        }

        function openVolumeLimitModal() {
            if (!volumeLimitModal) return;
            loadVolumeLimitConfigFromServer().then(() => {
                if (!volumeLimitInputs.volume.value) volumeLimitInputs.volume.value = 10000;
                volumeLimitModal.show();
            });
        }

        function saveAndRunVolumeLimit() {
            const symbol = volumeLimitInputs.symbol.value.trim();
            const volume = safeInt(volumeLimitInputs.volume.value);

            if (!symbol || !volume) {
                showToast('参数错误', '请填写有效的品种与手数(正整数)', 'danger');
                return;
            }

            const payload = {
                test_symbol: symbol,
                volume_limit_volume: volume,
            };

            fetch('/api/test/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            })
                .then((res) => res.json())
                .then((data) => {
                    if (data.status !== 'success') throw new Error(data.msg || '配置保存失败');
                    showToast('配置已更新', `合约=${symbol}, 手数=${volume}`, 'warning');
                    if (volumeLimitModal) volumeLimitModal.hide();
                    runTest('2.4.1.3');
                })
                .catch((err) => {
                    showToast('配置保存失败', String(err), 'danger');
                });
        }

        function appendLogLine(data) {
            const shouldFollow = isNearLogBottom();
            const div = document.createElement('div');
            div.className = 'log-line';
            div.style.color = data.color;
            div.textContent = data.message;
            logContainer.appendChild(div);

            if (shouldFollow) {
                logContainer.scrollTop = logContainer.scrollHeight;
            }

            while (logContainer.children.length > 1000) {
                logContainer.removeChild(logContainer.firstChild);
            }

            updateLogCount();
        }

        socket.on('new_log', (data) => {
            appendLogLine(data);

            const msg = String(data.message || '');
            let alertType = null;
            let alertTitle = '';

            if (msg.includes('【阈值预警】') || msg.includes('【风控预警】')) {
                alertType = msg.includes('【风控拦截】') ? 'danger' : 'warning';
                alertTitle = '预警';
            } else if (msg.includes('资金不足')) {
                alertType = 'warning';
                alertTitle = '资金告警';
            } else if (msg.includes('交易服务器连接成功') || msg.includes('行情服务器连接成功')) {
                alertType = 'success';
                alertTitle = '连接恢复';
            } else if (msg.includes('交易服务器连接断开') || msg.includes('行情服务器连接断开')) {
                alertType = 'danger';
                alertTitle = '连接断开';
            }

            if (alertType) {
                const now = Date.now();
                const key = msg.slice(0, 200);
                if (!(key === lastToastKey && (now - lastToastAt) < 3000)) {
                    lastToastKey = key;
                    lastToastAt = now;
                    showToast(alertTitle, msg, alertType);
                }
            }
        });

        socket.on('connect', () => {
            addSystemEvent('服务器已连接', 'online', true);
            loadThresholdsFromServer();
            loadSnapshot();
            refreshWorkerStatus();

            try {
                const stored = JSON.parse(localStorage.getItem('risk_thresholds') || 'null');
                if (stored && typeof stored === 'object') {
                    setFormFromThresholds(stored);
                }
            } catch (e) {}
        });

        socket.on('disconnect', () => {
            addSystemEvent('与服务器连接已断开', 'offline');
        });

        socket.on('worker_status', (data) => {
            renderWorkerStatus(data);
        });

        socket.on('case_finished', () => {
            refreshWorkerStatus();
        });

        document.addEventListener('DOMContentLoaded', () => {
            const thresholdEl = document.getElementById('thresholdModal');
            const volumeEl = document.getElementById('volumeLimitModal');
            const testEl = document.getElementById('testConfigModal');
            const repeatEl = document.getElementById('repeatMonitorConfigModal');
            const orderCancelEl = document.getElementById('orderCancelMonitorConfigModal');
            const storedRailState = localStorage.getItem(railStorageKey);

            if (thresholdEl) thresholdModal = new bootstrap.Modal(thresholdEl);
            if (volumeEl) volumeLimitModal = new bootstrap.Modal(volumeEl);
            if (testEl) testConfigModal = new bootstrap.Modal(testEl);
            if (repeatEl) repeatMonitorConfigModal = new bootstrap.Modal(repeatEl);
            if (orderCancelEl) orderCancelMonitorConfigModal = new bootstrap.Modal(orderCancelEl);

            thresholdInputs.repeatEnabled.addEventListener('change', syncRepeatThresholdState);
            railToggle.addEventListener('click', () => {
                const nextState = workspaceGrid.dataset.railState === 'collapsed' ? 'expanded' : 'collapsed';
                applyRailState(nextState);
                setMobileRailOpen(false);
            });
            mobileRailToggle.addEventListener('click', () => {
                const isOpen = workspaceGrid.dataset.mobileOpen === 'true';
                setMobileRailOpen(!isOpen);
            });

            if (storedRailState === 'collapsed') {
                applyRailState('collapsed');
            } else {
                applyRailState('expanded');
            }

            syncRepeatThresholdState();
            refreshWorkerStatus();
            loadSnapshot();
            updateLogCount();

            if (window.__ctpTheme && window.__ctpTheme.media) {
                window.__ctpTheme.media.addEventListener('change', (event) => {
                    const nextTheme = event.matches ? 'dark' : 'light';
                    window.__ctpTheme.applyTheme(nextTheme);
                    document.documentElement.setAttribute('data-bs-theme', nextTheme);
                });
            }
        });

        function runTest(caseId) {
            fetch(`/api/run/${caseId}`, { method: 'POST' })
                .then((res) => res.json())
                .then((data) => {
                    if (data.status !== 'success') {
                        alert(data.msg);
                        return;
                    }

                    refreshWorkerStatus();
                });
        }

        function resetSystem() {
            fetch('/api/control/reset', { method: 'POST' })
                .then((res) => res.json())
                .then((data) => {
                    alert(data.msg);
                    loadSnapshot();
                    refreshWorkerStatus();
                });
        }
    </script>
</body>
</html>
