<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTP 穿透测试 | 登录</title>
    <script>
        (() => {
            const themeMedia = window.matchMedia('(prefers-color-scheme: dark)');
            const getSystemTheme = () => themeMedia.matches ? 'dark' : 'light';
            const applyTheme = (nextTheme) => {
                document.documentElement.setAttribute('data-bs-theme', nextTheme);
            };

            window.__ctpTheme = {
                media: themeMedia,
                getSystemTheme,
                applyTheme,
            };

            const nextTheme = getSystemTheme();
            applyTheme(nextTheme);
            document.documentElement.setAttribute('data-bs-theme', nextTheme);
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
    <main class="login-layout">
        <section class="login-form-panel">
            <div class="login-form-header">
                <div>
                    <h2>CTP 穿透测试接入</h2>
                </div>
            </div>

            <form method="POST" action="/login" class="login-form">
                <section class="form-section">
                    <div class="form-grid">
                        <div class="field-group field-span-full">
                            <label class="form-label" for="ctp-name">期货公司名称</label>
                            <input id="ctp-name" type="text" class="form-control" name="CTP_NAME" value="{{ env.CTP_NAME or '' }}" required>
                        </div>
                        <div class="field-group">
                            <label class="form-label" for="ctp-broker-id">经纪商代码 (BrokerID)</label>
                            <input id="ctp-broker-id" type="text" class="form-control" name="CTP_BROKER_ID" value="{{ env.CTP_BROKER_ID or '' }}" required>
                        </div>
                        <div class="field-group">
                            <label class="form-label" for="ctp-username">账号</label>
                            <input id="ctp-username" type="text" class="form-control" name="CTP_USERNAME" value="{{ env.CTP_USERNAME or '' }}" required>
                        </div>
                        <div class="field-group">
                            <label class="form-label" for="ctp-password">密码</label>
                            <input id="ctp-password" type="password" class="form-control" name="CTP_PASSWORD" value="{{ env.CTP_PASSWORD or '' }}" required>
                        </div>
                    </div>
                </section>

                <section class="form-section">
                    <div class="form-grid">
                        <div class="field-group field-span-full">
                            <label class="form-label" for="ctp-td-server">交易服务器 (TD Server)</label>
                            <input id="ctp-td-server" type="text" class="form-control" name="CTP_TD_SERVER" value="{{ env.CTP_TD_SERVER or '' }}" required>
                        </div>
                        <div class="field-group field-span-full">
                            <label class="form-label" for="ctp-md-server">行情服务器 (MD Server)</label>
                            <input id="ctp-md-server" type="text" class="form-control" name="CTP_MD_SERVER" value="{{ env.CTP_MD_SERVER or '' }}" required>
                        </div>
                    </div>
                </section>

                <section class="form-section">
                    <div class="form-grid">
                        <div class="field-group">
                            <label class="form-label" for="appid">AppID</label>
                            <input id="appid" type="text" class="form-control" name="APPID" value="{{ env.APPID or '' }}" required>
                        </div>
                        <div class="field-group">
                            <label class="form-label" for="auth-code">授权码 (Auth Code)</label>
                            <input id="auth-code" type="text" class="form-control" name="CTP_AUTH_CODE" value="{{ env.CTP_AUTH_CODE or '' }}" required>
                        </div>
                        <div class="field-group field-span-full">
                            <label class="form-label" for="product-info">产品信息 (Product Info)</label>
                            <input id="product-info" type="text" class="form-control" name="CTP_PRODUCT_INFO" value="{{ env.CTP_PRODUCT_INFO or '' }}">
                        </div>
                    </div>
                </section>

                <div class="login-actions">
                    <button type="submit" class="btn btn-primary">连接 / 登录</button>
                </div>
            </form>
        </section>
    </main>
    <script>
        if (window.__ctpTheme && window.__ctpTheme.media) {
            window.__ctpTheme.media.addEventListener('change', (event) => {
                const nextTheme = event.matches ? 'dark' : 'light';
                window.__ctpTheme.applyTheme(nextTheme);
                document.documentElement.setAttribute('data-bs-theme', nextTheme);
            });
        }
    </script>
</body>
</html>
